<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquête Habitudes Alimentaires</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>📊 Enquête sur les Habitudes Alimentaires</h1>
        <p>Aidez-nous à mieux comprendre vos habitudes en remplissant ce formulaire.</p>

        <form action="{{ url_for('submit') }}" method="POST">
            <div class="form-group">
                <label>Date du repas :</label>
                <input type="date" name="date" required>
            </div>

            <div class="form-group">
                <label>Heure approximative :</label>
                <input type="time" name="heure" required>
            </div>

            <div class="form-group">
                <label>Type de repas :</label>
                <select name="type_repas" required>
                    <option value="">Choisissez...</option>
                    <option value="Petit-déjeuner">Petit-déjeuner</option>
                    <option value="Déjeuner">Déjeuner</option>
                    <option value="Dîner">Dîner</option>
                    <option value="Collation">Collation</option>
                </select>
            </div>

            <div class="form-group">
                <label>Aliments consommés (détaillez) :</label>
                <textarea name="aliments" rows="3" placeholder="Ex: Pain, oeuf, café..." required></textarea>
            </div>

            <div class="form-group">
                <label>Quantité :</label>
                <select name="quantite" required>
                    <option value="">Choisissez...</option>
                    <option value="Petite">Petite portion</option>
                    <option value="Moyenne">Moyenne portion</option>
                    <option value="Grande">Grande portion</option>
                </select>
            </div>

            <div class="form-group">
                <label>Lieu :</label>
                <select name="lieu" required>
                    <option value="">Choisissez...</option>
                    <option value="Maison">À la maison</option>
                    <option value="Travail">Au travail/Université</option>
                    <option value="Restaurant">Au restaurant</option>
                    <option value="Autre">Autre</option>
                </select>
            </div>

            <div class="form-group">
                <label>Niveau de faim avant (1 = Pas du tout, 5 = Très faim) :</label>
                <input type="range" name="niveau_faim" min="1" max="5" value="3">
            </div>

            <div class="form-group">
                <label>Niveau de satisfaction après (1 = Pas content, 5 = Très content) :</label>
                <input type="range" name="niveau_satisfaction" min="1" max="5" value="3">
            </div>

            <button type="submit" class="btn">Envoyer les données</button>
        </form>
        
        <br>
        <a href="{{ url_for('resultats') }}" class="btn btn-secondary">Voir les statistiques</a>
    </div>
</body>
</html>
